services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ./data/:/root/
    networks: [ollama]

  maker-server:
    build: ./server
    container_name: maker-server
    environment:
      - BACKEND_PORT=${BACKEND_PORT}
    volumes:
      - ./config/maker:/app/config
    networks:
      traefik:
      ollama:
        ipv4_address: 172.11.0.3
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.http-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.maker-http.rule=Host(`maker.app.io`) ||
        Host(`maker`)"
      - "traefik.http.routers.maker-http.middlewares=http-to-https@file"
      - "traefik.http.routers.maker-http.entrypoints=web"

      - "traefik.http.routers.maker-https.rule=Host(`maker.app.io`) ||
        Host(`maker`)"
      - "traefik.http.routers.maker-https.tls=true"
      - "traefik.http.routers.maker-https.entrypoints=websecure"
      - "traefik.http.routers.maker-https.service=maker-service"
      - "traefik.http.services.maker-service.loadbalancer.server.port=3000" # public

      - "traefik.http.routers.maker-public-http.rule=Host(`maker.bidn.dev`)"
      - "traefik.http.routers.maker-public-http.entrypoints=web"
      - "traefik.http.routers.maker-public-http.service=maker-service-public"
      - "traefik.http.services.maker-service-public.loadbalancer.server.scheme=\
        http"
      - "traefik.http.services.maker-service-public.loadbalancer.server.port=30\
        00"

networks:
  ollama:
    name: ollama
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.11.0.0/24
          gateway: 172.11.0.1
  traefik:
    external: true
